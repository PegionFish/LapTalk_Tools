name: Build csv_visual EXE

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: PyInstaller output mode
        type: choice
        default: onefile
        options:
          - onefile
          - onedir
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "csv_visual/**"
      - ".github/workflows/csv-visual-build.yml"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: csv_visual/requirements.txt

      - name: Install dependencies
        working-directory: csv_visual
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        working-directory: csv_visual
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Build EXE
        working-directory: csv_visual
        run: |
          $buildArgs = @()
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.build_mode }}" -eq "onedir") {
              $buildArgs += "--onedir"
          }
          python .\build_exe.py @buildArgs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HWiNFO-CSV-Plotter-windows-${{ github.run_number }}
          path: |
            csv_visual/dist/HWiNFO-CSV-Plotter.exe
            csv_visual/dist/HWiNFO-CSV-Plotter/**
          if-no-files-found: error
          retention-days: 14

      - name: Generate release checksum
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: csv_visual
        run: |
          $assetPath = ".\dist\HWiNFO-CSV-Plotter.exe"
          $hash = (Get-FileHash $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  HWiNFO-CSV-Plotter.exe" | Set-Content -Encoding utf8 .\dist\HWiNFO-CSV-Plotter.exe.sha256

      - name: Attach assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            csv_visual/dist/HWiNFO-CSV-Plotter.exe
            csv_visual/dist/HWiNFO-CSV-Plotter.exe.sha256
